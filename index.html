<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğlence Dünyası</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-decorations">
        <div class="cloud cloud-1">☁️</div>
        <div class="cloud cloud-2">☁️</div>
        <div class="cloud cloud-3">☁️</div>
        <div class="cloud cloud-4">☁️</div>
        <div class="heart heart-1">💖</div>
        <div class="heart heart-2">💖</div>
        <div class="heart heart-3">💖</div>
        <div class="heart heart-4">💖</div>
        <div class="heart heart-5">💖</div>
    </div>

    <header>
        <h1>✨ Ela'nın Eğlence Dünyası ✨</h1>
        <p>Hoş geldin! Bugün ne yapmak istersin?</p>
    </header>

    <main class="container">
        <a href="https://ela-music-player.vercel.app" class="category-card music" style="text-decoration: none; color: inherit;" target="_blank">
            <div class="icon">🎵</div>
            <h2>Müzik</h2>
            <p>En sevdiğin şarkıları dinle!</p>
        </a>

        <a href="videolar.html" class="category-card video" style="text-decoration: none; color: inherit;">
            <div class="icon">🎬</div>
            <h2>Video</h2>
            <p>Komik ve eğlenceli videolar izle!</p>
        </a>

        <a href="oyunlar.html" class="category-card game" style="text-decoration: none; color: inherit;"
            onclick="console.log('Opening Games Page');">
            <div class="icon">🎮</div>
            <h2>Oyun</h2>
            <p>Harika oyunlar oyna!</p>
        </a>

        <a href="resimler.html" class="category-card pictures" style="text-decoration: none; color: inherit;">
            <div class="icon">🖼️</div>
            <h2>Resimler</h2>
            <p>Anılarına göz at!</p>
        </a>
    </main>

    <footer>
        <p>Senin için hazırlandı! 🎈</p>
    </footer>
</body>

</html>
